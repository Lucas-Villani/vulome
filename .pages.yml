# Configuración del panel visual Pages CMS — https://pagescms.org
media:
  input: public/images/productos
  output: /images/productos

content:
  - name: productos
    label: Productos
    type: collection
    path: src/content/productos
    filename: '{fields.nombre}.json'
    view:
      fields:
        - nombre
        - categoria
        - precio
    fields:
      - name: nombre
        label: Nombre del producto
        type: string
      - name: categoria
        label: Categoría
        type: reference
        options:
          collection: categorias
          value: '{nombre}'
          label: '{nombre}'
          search: nombre
      - name: precio
        label: Precio (si es de un solo tamaño; sin puntos ni símbolos)
        type: number
      - name: medidas
        label: Medidas / variantes (opcional — dejar vacío si es de un solo tamaño)
        type: object
        list: true
        fields:
          - name: medida
            label: Medida (ej. 600 ml)
            type: string
          - name: precio
            label: Precio de esta medida
            type: number
      - name: descripcion
        label: Descripción
        type: text
      - name: material
        label: Material (ej. Vidrio borosilicato)
        type: string
      - name: incluye
        label: Qué incluye (ej. Tetera + infusor de acero)
        type: string
      - name: imagenes
        label: Fotos del producto (subí varias de una y ordenalas arrastrando)
        type: image
        options:
          multiple: true
      - name: destacado
        label: Destacado (resaltar el producto)
        type: boolean

  - name: categorias
    label: Categorías
    type: collection
    path: src/content/categorias
    filename: '{fields.nombre}.json'
    view:
      fields:
        - nombre
        - orden
    fields:
      - name: nombre
        label: Nombre de la categoría
        type: string
      - name: descripcion
        label: Descripción (texto corto que aparece en la tarjeta de la categoría)
        type: text
      - name: orden
        label: Orden (número; el menor aparece primero en el menú)
        type: number

  - name: sitio
    label: Configuración del sitio
    type: file
    path: src/data/sitio.json
    fields:
      - name: nombre
        label: Nombre del sitio
        type: string
      - name: tagline
        label: Tagline (subtítulo)
        type: string
      - name: descripcion
        label: Descripción del sitio
        type: text
      - name: whatsapp
        label: WhatsApp (formato internacional, ej 5491122334455)
        type: string
      - name: instagram
        label: Usuario de Instagram (sin la @)
        type: string
      - name: email
        label: Email de contacto
        type: string
